cpds:
  default:
    cpds:
      estimator: mle
      kwargs: {}

  pgmpy_mle:
    cpds:
      estimator: mle
      kwargs: {}

  pgmpy_bdeu:
    cpds:
      estimator: bdeu
      kwargs:
        equivalent_sample_size: 10

  pgmpy_gaussian:
    cpds:
      estimator: gaussian
      kwargs: {}

inference:
  default:
    cpds:
      estimator: mle
      kwargs: {}
    inference:
      method: exact_variable_elimination
      kwargs: {}

  pgmpy_mle_ei:
    cpds:
      estimator: mle
      kwargs: {}
    inference:
      method: exact_variable_elimination
      kwargs: {}

  pgmpy_bdeu_ei:
    cpds:
      estimator: bdeu
      kwargs:
        equivalent_sample_size: 10
    inference:
      method: exact_variable_elimination
      kwargs: {}

  pgmpy_gaussian_exact:
    cpds:
      estimator: gaussian
      kwargs: {}
    inference:
      method: gaussian_exact
      kwargs: {}

  pgmpy_gaussian_fs:
    cpds:
      estimator: gaussian
      kwargs: {}
    inference:
      method: gaussian_forward_sample
      kwargs:
        n_samples_infer: 4096
        n_resample: 1024
